# Netlify: this repo is a Swift app; the website is just the static one-pager in
# site/. Set the base directory to site/ so Netlify never sees Package.swift and
# doesn't try to install Swift / build the app. There is nothing to build — the
# publish directory is the base directory itself.
[build]
  base = "site"
  publish = "."
  command = "echo 'Static site — nothing to build.'"
